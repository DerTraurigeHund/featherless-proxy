<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featherless Proxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;750&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>
<div class="center-screen">
    <div class="auth-card" style="text-align:center">
        <div class="auth-logo">🪶</div>
        <h1 style="font-size:1.5rem;margin:8px 0 4px"><span class="brand-gradient">Featherless Proxy</span></h1>
        <p class="muted" style="font-size:0.85rem;margin-bottom:18px">Priority queue · Chunk cache · Credits · Streaming</p>
        <p class="muted" style="font-size:0.85rem;margin-bottom:18px">OpenAI-compatible gateway with cost tracking and an admin &amp; user dashboard.</p>
        <a href="/login"><button style="width:100%">Sign in →</button></a>
    </div>
</div>
<script>
fetch('/api/session', { credentials: 'same-origin' }).then(r => r.json()).then(s => {
    if (s.authenticated) location.href = s.is_admin ? '/admin' : '/dashboard';
}).catch(() => {});
</script>
</body>
</html>
